# jira-integration.yml — end-to-end validation against a live Jira instance (GitHub Actions).
#
# This is the GITHUB ACTIONS variant of the Jira integration pipeline. It targets the
# `gha` Jira environment (projects seeded as PEGHA*) using GitHub secrets.
# A separate Woodpecker variant (.woodpecker/jira-integration.yml) targets the
# `wp` Jira environment (projects seeded as PEWP*) using Woodpecker secrets.
# The two pipelines are complementary, not redundant — they hit different Jira
# projects seeded independently on different CI infrastructure.
#
# This GHA variant also runs verify-reports and jira-cucumber in parallel
# (using `needs: setup`) whereas the Woodpecker variant runs them sequentially.
#
# Pipeline:
#   1. setup             provision the three gha-environment Jira projects with test data
#   2. verify-reports    validate the full report pipeline against the seeded project
#   3. jira-cucumber     run @real_jira BDD scenarios (parallel with verify-reports)
#
# Manual trigger only — Jira writes are side-effectful.
#
# Required GitHub secrets:
#   JIRA_SITE         — Jira instance URL
#   JIRA_EMAIL        — Jira account email
#   JIRA_API_TOKEN    — Jira API token

name: Jira Integration

on:
  workflow_dispatch:

env:
  JIRA_SITE:      ${{ secrets.JIRA_SITE }}
  JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
  JIRA_ENV:       gha

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.2'
          bundler-cache: true
      - name: Provision Jira projects
        run: bundle exec ruby scripts/jira_project_setup.rb setup --env gha --count 25 --profile gha

  verify-reports:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.2'
          bundler-cache: true
      - name: Install Playwright
        run: npm install playwright && npx playwright install chromium --with-deps
      - name: Verify summary report
        run: bundle exec ./bin/predictability-engine summary  PEGHATBD
      - name: Verify forecast report
        run: bundle exec ./bin/predictability-engine forecast PEGHATBD 10
      - name: Verify HTML report
        run: |
          bundle exec ./bin/predictability-engine report PEGHATBD html /tmp/jira.html
          test -s /tmp/jira.html

  jira-cucumber:
    runs-on: ubuntu-latest
    needs: setup
    env:
      CUCUMBER_PUBLISH_QUIET: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.2'
          bundler-cache: true
      - name: Install Playwright
        run: npm install playwright && npx playwright install chromium --with-deps
      - name: Run Jira BDD scenarios
        run: bundle exec cucumber features/jira_pipeline.feature --tags @real_jira
