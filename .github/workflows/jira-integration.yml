# jira-integration.yml — end-to-end validation against a live Jira instance (GitHub Actions).
#
# Pipeline:
#   1. setup             provision the three gha-environment Jira projects with test data
#   2. verify-reports    validate the full report pipeline against the seeded project
#   3. jira-cucumber     run @real_jira BDD scenarios
#
# Manual trigger only — Jira writes are side-effectful.
#
# Required GitHub secrets:
#   JIRA_SITE         — Jira instance URL
#   JIRA_EMAIL        — Jira account email
#   JIRA_API_TOKEN    — Jira API token

name: Jira Integration

on:
  workflow_dispatch:

env:
  JIRA_SITE:      ${{ secrets.JIRA_SITE }}
  JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
  JIRA_ENV:       gha

x-ruby-setup: &ruby-setup
  - uses: actions/checkout@v4
  - uses: ruby/setup-ruby@v1
    with:
      ruby-version: '4.0.2'
      bundler-cache: true

x-playwright-setup: &playwright-setup
  - name: Install Playwright
    run: npm install playwright && npx playwright install chromium --with-deps

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - *ruby-setup
      - name: Provision Jira projects
        run: bundle exec ruby scripts/jira_project_setup.rb setup --env gha --count 25 --profile gha

  verify-reports:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - *ruby-setup
      - *playwright-setup
      - name: Verify summary report
        run: bundle exec ./bin/predictability-engine summary  PEGHATBD
      - name: Verify forecast report
        run: bundle exec ./bin/predictability-engine forecast PEGHATBD 10
      - name: Verify HTML report
        run: |
          bundle exec ./bin/predictability-engine report PEGHATBD html /tmp/jira.html
          test -s /tmp/jira.html

  jira-cucumber:
    runs-on: ubuntu-latest
    needs: setup
    env:
      CUCUMBER_PUBLISH_QUIET: "true"
    steps:
      - *ruby-setup
      - *playwright-setup
      - name: Run Jira BDD scenarios
        run: bundle exec cucumber features/jira_pipeline.feature --tags @real_jira
