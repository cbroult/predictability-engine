name: 'Ruby Setup'
description: 'Configure Ruby with bundler cache, install Node dependencies, and install Playwright Chromium'
runs:
  using: composite
  steps:
    - uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true
    - name: Install Node dependencies
      shell: bash
      run: npm ci
    - name: Install Playwright Chromium
      shell: bash
      run: npx playwright install chromium --with-deps
