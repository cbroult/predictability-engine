when:
  event: [pull_request, manual]

clone:
  git:
    image: woodpeckerci/plugin-git:2.8.0
    settings:
      skip_verify: true

steps:
  - name: cpd
    image: node:22-alpine
    commands:
      # Strict copy-paste detection — thresholds and exclusions live in
      # .jscpd.json (non-gherkin) and .jscpd.gherkin.json (gherkin).
      # Pass --config explicitly because newer jscpd versions no longer
      # auto-discover .jscpd.json from the working directory.
      - npx --yes jscpd --config .jscpd.json
      - npx --yes jscpd --config .jscpd.gherkin.json

  - name: badge
    image: docker-registry.cbp-org.internal/badge-reporter:latest
    when:
      status: [success, failure]
    backend_options:
      docker:
        network_mode: host
    environment:
      BADGE_SECRET:
        from_secret: badge_service_token
    commands:
      - badge report code-quality
