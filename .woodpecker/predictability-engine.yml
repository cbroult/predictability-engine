# predictability-engine.yml — manual-only fallback for rebuilding the
# predictability-engine Docker image outside the normal publish pipeline.
#
# The normal path is `.woodpecker/publish.yml`, which rebuilds the image at
# :v<version> + :latest after every gem publish. This pipeline exists so that
# operators can force an image rebuild (e.g. after a CA cert rotation or base
# image CVE) without cutting a new gem release.
#
# Triggers:
#   - manual only
#
# Required Woodpecker secrets (org-level cbp-org):
#   cbp_org_ca_cert       — Base64-encoded cbp-org root CA certificate
#   nexus_deploy_key      — SSH private key for root@nexus.cbp-org.internal
#   badge_service_token   — Write token for badge.cbp-org.internal

when:
  - event: manual

clone:
  git:
    image: woodpeckerci/plugin-git:2.8.0
    settings:
      skip_verify: true

steps:
  - name: rebuild-image
    image: ruby:4.0.2-alpine
    environment:
      CBP_ORG_CA_CERT:
        from_secret: cbp_org_ca_cert
      NEXUS_DEPLOY_KEY:
        from_secret: nexus_deploy_key
    commands:
      - apk add --no-cache openssh-client
      - sh scripts/build-engine-image.sh

  - name: badge
    image: docker-registry.cbp-org.internal/badge-reporter:latest
    when:
      status: [success, failure]
    backend_options:
      docker:
        network_mode: host
    environment:
      BADGE_SECRET:
        from_secret: badge_service_token
    commands:
      - badge report predictability-engine
