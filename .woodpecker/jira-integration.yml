# jira-integration.yml — end-to-end validation against a live Jira instance.
#
# This is the WOODPECKER variant of the Jira integration pipeline. It targets the
# `wp` Jira environment (projects seeded as PEWP*) using Woodpecker secrets.
# A separate GitHub Actions variant (.github/workflows/jira-integration.yml)
# targets the `gha` Jira environment (projects seeded as PEGHA*) using GHA secrets.
# The two pipelines are complementary, not redundant — they hit different Jira
# projects seeded independently on different CI infrastructure.
#
# Pipeline:
#   1. setup             run scripts/jira_project_setup.rb to provision the three
#                        wp-environment Jira projects with realistic test data
#   2. verify-reports    run predictability-engine summary/report/forecast
#                        against one seeded project — confirms the live Jira
#                        data source can feed the full report pipeline
#   3. jira-cucumber     run the @real_jira BDD scenarios
#   4. badge             always report
#
# Manual trigger only — Jira writes are side-effectful and we never want these
# firing on every push.
#
# Required Woodpecker secrets (org-level cbp-org):
#   jira_site             — Jira instance URL
#   jira_email            — Jira account email
#   jira_api_token        — Jira API token
#   jira_profile_wp       — credentials profile name for wp environment
#   badge_service_token   — Write token for badge.cbp-org.internal

variables:
  - &network_host
    backend_options:
      docker:
        network_mode: host
  - &jira_env
    JIRA_SITE:
      from_secret: jira_site
    JIRA_EMAIL:
      from_secret: jira_email
    JIRA_API_TOKEN:
      from_secret: jira_api_token
    JIRA_ENV: wp

when:
  event: manual
  branch: main

steps:
  - name: setup
    image: ruby:4.0.2-alpine
    <<: *network_host
    environment: *jira_env
    commands:
      - apk add --no-cache build-base
      - bundle install --jobs 4 --retry 3
      - bundle exec ruby scripts/jira_project_setup.rb setup --env wp --count 25 --profile wp

  - name: verify-reports
    image: ruby:4.0.2-alpine
    <<: *network_host
    environment: *jira_env
    commands:
      - apk add --no-cache build-base nodejs npm
      - npm install playwright && npx playwright install chromium --with-deps
      - bundle install --jobs 4 --retry 3
      - bundle exec ./bin/predictability-engine summary  PEWPTBD
      - bundle exec ./bin/predictability-engine forecast PEWPTBD 10
      - bundle exec ./bin/predictability-engine report   PEWPTBD html /tmp/jira.html
      - test -s /tmp/jira.html

  - name: jira-cucumber
    image: ruby:4.0.2-alpine
    <<: *network_host
    environment:
      <<: *jira_env
      CUCUMBER_PUBLISH_QUIET: "true"
    commands:
      - apk add --no-cache build-base nodejs npm
      - npm install playwright && npx playwright install chromium --with-deps
      - bundle install --jobs 4 --retry 3
      - bundle exec cucumber features/jira_pipeline.feature --tags @real_jira

  - name: badge
    image: docker-registry.cbp-org.internal/badge-reporter:latest
    when:
      status: [success, failure]
    <<: *network_host
    environment:
      BADGE_SECRET:
        from_secret: badge_service_token
    commands:
      - badge report jira-integration
