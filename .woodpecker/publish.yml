# publish.yml — RC phase: test → auto-bump → build X.Y.Z.rc1 → publish RC to internal registry.
#
# Single-step pipeline (one container) to minimise container-spin-up overhead.
# Uses docker-registry.cbp-org.internal/predictability-engine-ci:latest — a
# pre-built image with nodejs/npm/openssh-client baked in (see Dockerfile.ci).
#
# Pipeline sequence (all in one container):
#   1. ./bin/setup                       install gems + Playwright Chromium
#   2. bundle exec rake verify           full test gate
#   3. scripts/auto-bump.sh              patch-bump version on push to main only
#   4. scripts/build-rc-gem.sh           build X.Y.Z.rc1 gem (version.rb temporarily patched)
#   5. scripts/publish-gem.sh            push X.Y.Z.rc1 to gems.cbp-org.internal
#
# After this workflow succeeds, verify-linux.yml and verify-windows.yml run in
# parallel (depends_on: publish), then promote.yml runs (depends_on: verify-linux
# + verify-windows) to publish the final X.Y.Z gem to both registries and GitHub.
#
# Required Woodpecker secrets (org-level cbp-org):
#   forgejo_push_token    — Forgejo PAT with write on this repo (for auto-bump)
#   cbp_org_ca_cert       — Base64-encoded cbp-org root CA certificate
#   gem_user              — Geminabox username
#   gem_password          — Geminabox password
#   badge_service_token   — Write token for badge.cbp-org.internal

labels:
  platform: linux

clone:
  git:
    image: woodpeckerci/plugin-git:2.8.0
    settings:
      skip_verify: true
    backend_options:
      docker:
        extra_hosts:
          - "git.cbp-org.internal:192.168.16.23"

when:
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*
  - event: manual

steps:
  - name: publish-rc
    image: docker-registry.cbp-org.internal/predictability-engine-ci:latest
    backend_options:
      docker:
        network_mode: host
        extra_hosts:
          - "git.cbp-org.internal:192.168.16.23"
          - "gems.cbp-org.internal:192.168.16.23"
    environment:
      CUCUMBER_PUBLISH_QUIET: "true"
      FORGEJO_PUSH_TOKEN:
        from_secret: forgejo_push_token
      CBP_ORG_CA_CERT:
        from_secret: cbp_org_ca_cert
      GEM_USER:
        from_secret: gem_user
      GEM_PASSWORD:
        from_secret: gem_password
    commands:
      - mkdir -p /root/.local/share/ruby-advisory-db/gems
      - ./bin/setup
      - bundle exec rake verify
      - if [ "${CI_PIPELINE_EVENT}" = "push" ] && [ "${CI_COMMIT_BRANCH}" = "main" ]; then sh scripts/auto-bump.sh; fi
      - sh scripts/build-rc-gem.sh
      - sh scripts/publish-gem.sh

  - name: badge
    image: docker-registry.cbp-org.internal/badge-reporter:latest
    when:
      status: [success, failure]
    backend_options:
      docker:
        extra_hosts:
          - "badge.cbp-org.internal:192.168.16.23"
    environment:
      BADGE_SECRET:
        from_secret: badge_service_token
    commands:
      - badge report publish
