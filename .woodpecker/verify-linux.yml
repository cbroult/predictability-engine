# verify-linux.yml — Linux fresh-install validation of the RC gem.
#
# Runs after publish.yml succeeds (depends_on: publish). Installs
# X.Y.Z.rc1 from gems.cbp-org.internal — the RC just published by the
# publish workflow — then runs `predictability-engine setup` and the
# full verify-fresh-install smoke suite.
#
# Single-step pipeline (one container) using the pre-built CI image.

labels:
  platform: linux

depends_on:
  - publish

clone:
  git:
    image: woodpeckerci/plugin-git:2.8.0
    settings:
      skip_verify: true
    backend_options:
      docker:
        extra_hosts:
          - "git.cbp-org.internal:192.168.16.23"

when:
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*
  - event: manual

steps:
  - name: verify-linux
    image: docker-registry.cbp-org.internal/predictability-engine-ci:latest
    backend_options:
      docker:
        extra_hosts:
          - "gems.cbp-org.internal:192.168.16.23"
    environment:
      CBP_ORG_CA_CERT:
        from_secret: cbp_org_ca_cert
    commands:
      - printf '%s' "$CBP_ORG_CA_CERT" | base64 -d > /usr/local/share/ca-certificates/cbp-org.crt
      - update-ca-certificates
      - export GEM_VERSION=$(ruby -e "load 'lib/predictability_engine/version.rb'; puts PredictabilityEngine::VERSION").rc1
      - gem install predictability-engine --version "$GEM_VERSION" --source https://gems.cbp-org.internal --no-document
      - predictability-engine setup
      - sh scripts/verify-fresh-install.sh
