# verify-linux.yml — Linux fresh-install validation of the built gem.
#
# Runs after publish.yml succeeds (depends_on: publish). Downloads the
# gem from Forgejo generic packages (uploaded by publish.yml) using
# CI_PIPELINE_NUMBER as the artifact slot (pipeline-N/predictability-engine-ci.gem)
# so the download URL is version-agnostic and matches exactly what publish uploaded.
#
# Single-step pipeline (one container) using the pre-built CI image.

labels:
  platform: linux

depends_on:
  - publish

clone:
  git:
    image: woodpeckerci/plugin-git:2.8.0
    settings:
      skip_verify: true
    backend_options:
      docker:
        extra_hosts:
          - "git.cbp-org.internal:192.168.16.23"

when:
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*
  - event: manual

steps:
  - name: verify-linux
    image: docker-registry.cbp-org.internal/predictability-engine-ci:latest
    backend_options:
      docker:
        extra_hosts:
          - "git.cbp-org.internal:192.168.16.23"
    environment:
      CBP_ORG_CA_CERT:
        from_secret: cbp_org_ca_cert
      FORGEJO_PUSH_TOKEN:
        from_secret: forgejo_push_token
    commands:
      - printf '%s' "$CBP_ORG_CA_CERT" | base64 -d > /tmp/cbp-ca.crt
      - export NODE_EXTRA_CA_CERTS=/tmp/cbp-ca.crt
      - ruby scripts/download-gem-artifact
      - gem install predictability-engine-ci.gem --no-document
      - predictability-engine setup
      - ruby scripts/verify-fresh-install
