# verify-linux.yml — Linux fresh-install validation of the built gem.
#
# Runs after publish.yml succeeds (depends_on: publish). Downloads the
# X.Y.Z gem from Forgejo generic packages (uploaded by publish.yml)
# and installs it locally, then runs `predictability-engine setup` and
# the full verify-fresh-install smoke suite.
#
# Single-step pipeline (one container) using the pre-built CI image.

labels:
  platform: linux

depends_on:
  - publish

clone:
  git:
    image: woodpeckerci/plugin-git:2.8.0
    settings:
      skip_verify: true
    backend_options:
      docker:
        extra_hosts:
          - "git.cbp-org.internal:192.168.16.23"

when:
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*
  - event: manual

steps:
  - name: verify-linux
    image: docker-registry.cbp-org.internal/predictability-engine-ci:latest
    backend_options:
      docker:
        extra_hosts:
          - "git.cbp-org.internal:192.168.16.23"
    environment:
      CBP_ORG_CA_CERT:
        from_secret: cbp_org_ca_cert
      FORGEJO_PUSH_TOKEN:
        from_secret: forgejo_push_token
    commands:
      - printf '%s' "$CBP_ORG_CA_CERT" | base64 -d > /tmp/cbp-ca.crt
      - cat /etc/ssl/certs/ca-certificates.crt /tmp/cbp-ca.crt > /tmp/ca-bundle.crt
      - export SSL_CERT_FILE=/tmp/ca-bundle.crt NODE_EXTRA_CA_CERTS=/tmp/cbp-ca.crt
      - sh scripts/download-gem-artifact.sh
      - gem install predictability-engine-*.gem --no-document
      - predictability-engine setup
      - sh scripts/verify-fresh-install.sh
