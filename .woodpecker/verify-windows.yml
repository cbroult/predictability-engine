# verify-windows.yml — Windows smoke test on a native photocenter agent.
#
# Runs after the publish workflow (depends_on ensures the gem is already
# pushed to gems.cbp-org.internal before we try to install it).
#
# Agent targeting: photocenter via labels matching custom_labels {platform: windows}.
# platform: field is NOT a routing directive — labels: is.
# image: powershell selects PowerShell as the local shell on the local backend.
# failure: ignore — Windows CI is best-effort; Linux is the release gate.
#
# Clone override: Git Credential Manager (GCM) on Windows intercepts HTTPS auth
# and requires interactive OAuth (no TTY in CI). We bypass it by disabling
# credential.helper and embedding the Forgejo PAT directly in the clone URL.
# SSL trust: woodpecker-windows-agent.ps1 imports the cbp-org CA into
# LocalMachine\Root and sets git http.sslBackend=schannel so git trusts it.

labels:
  platform: windows

when:
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*
  - event: manual

depends_on:
  - publish

clone:
  git:
    image: powershell
    environment:
      FORGEJO_TOKEN:
        from_secret: forgejo_push_token
    commands:
      - git -c credential.helper="" clone --depth 1 "https://oauth2:$($env:FORGEJO_TOKEN)@git.cbp-org.internal/cbp-org/predictability-engine.git" .

steps:
  - name: verify-fresh-install-windows
    image: powershell
    failure: ignore
    environment:
      CBP_ORG_CA_CERT:
        from_secret: cbp_org_ca_cert
    commands:
      - powershell -File scripts\verify-fresh-install-windows.ps1
