# verify-windows.yml — Windows fresh-install validation of the built gem.
#
# Runs after publish.yml succeeds (depends_on: publish). Downloads the
# X.Y.Z gem from the Nexus raw artifact store (uploaded by publish.yml)
# and installs it locally, then runs `predictability-engine setup` and
# the full verify-fresh-install smoke suite.
#
# Agent targeting: photocenter via labels matching custom_labels {platform: windows}.
# platform: field is NOT a routing directive — labels: is.
# image: powershell selects PowerShell as the local shell on the local backend;
# the command itself uses pwsh (PowerShell 7) which reads scripts as UTF-8 by default.
#
# Clone auth: deploy-windows-agent.ps1 stores the Forgejo PAT as
# git system http.https://git.cbp-org.internal.extraHeader so git authenticates
# automatically as any user (including SYSTEM) without needing runtime secrets.
# SSL trust: deploy-windows-agent.ps1 also configures http.sslBackend=schannel
# so git trusts the cbp-org root CA from LocalMachine\Root.

labels:
  platform: windows

depends_on:
  - publish

when:
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*
  - event: manual

steps:
  - name: verify-fresh-install-windows
    image: powershell
    environment:
      CBP_ORG_CA_CERT:
        from_secret: cbp_org_ca_cert
      NEXUS_USER:
        from_secret: nexus_user
      NEXUS_PASSWORD:
        from_secret: nexus_password
    commands:
      - pwsh -ExecutionPolicy Bypass -File scripts\verify-fresh-install-windows.ps1
