teams:
  - abbrev: TBD
    name: The Big Dog Team
    workflow: PE Big Dog Workflow
    issue_types:
      - Story
      - Task
      - Bug
    statuses:
      - { name: "To Do",          category: "to do"       }
      - { name: "In Development", category: "in progress", role: arrival   }
      - { name: "Code Review",    category: "in progress"                  }
      - { name: "Done",           category: "done",        role: departure }

  - abbrev: TQW
    name: The Quality Whisperers
    workflow: PE Quality Whisperers Workflow
    issue_types:
      - Story
      - Bug
      - Test Case
    statuses:
      - { name: "To Do",             category: "to do"       }
      - { name: "Ready for Testing", category: "in progress", role: arrival   }
      - { name: "In Testing",        category: "in progress"                  }
      - { name: "Test Review",       category: "in progress"                  }
      - { name: "Done",              category: "done",        role: departure }

  - abbrev: TST
    name: The Support Team
    workflow: PE Support Team Workflow
    issue_types:
      - Incident
      - Service Request
      - Problem
    statuses:
      - { name: "New",                  category: "to do"       }
      - { name: "Triaged",              category: "to do"       }
      - { name: "In Progress",          category: "in progress", role: arrival   }
      - { name: "Waiting for Customer", category: "in progress"                  }
      - { name: "Resolved",             category: "done",        role: departure }
      - { name: "Closed",               category: "done",        role: departure }
